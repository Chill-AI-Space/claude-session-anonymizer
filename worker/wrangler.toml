name = "session-collector"
main = "src/index.js"
compatibility_date = "2024-12-01"

routes = [
  { pattern = "chillai.space/anonymised-claude-sessions/*", zone_name = "chillai.space" }
]

# R2 bucket for session files
[[r2_buckets]]
binding = "SESSIONS"
bucket_name = "anonymized-sessions"

# KV for metadata index + rate limiting
[[kv_namespaces]]
binding = "META"
id = "72497f2f45e343968c031f92b4378a04"

[vars]
BASE_PATH = "/anonymised-claude-sessions"
# Max submissions per IP per hour
RATE_LIMIT_PER_HOUR = "10"
# Max file size in bytes (5MB)
MAX_FILE_SIZE = "5242880"
